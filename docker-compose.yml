# eOffice — production stack for a single server with a domain.
#   web    : Caddy (auto-HTTPS) serving the built frontend + reverse-proxying /api → api
#   api    : Express + Prisma/SQLite backend; SQLite + uploaded docs on the eoffice_db volume
#   minio + createbuckets : OPT-IN S3 object store (profile "s3"); only for STORAGE_DRIVER=s3
#
# Copy .env.production.example → .env and fill in the values, then:
#   docker compose up -d --build              # default: documents on local disk
#   docker compose --profile s3 up -d --build # optional: documents in MinIO/S3

services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      # SQLite lives on the eoffice_db volume (see below).
      DATABASE_URL: "file:/data/prod.db"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
      # Documents. Default: local disk at /data/uploads on the eoffice_db volume (any CPU).
      # Set STORAGE_DRIVER=s3 in .env + run with `--profile s3` to use MinIO instead
      # (requires a CPU with x86-64-v2 support — see .env.production.example).
      STORAGE_DRIVER: ${STORAGE_DRIVER:-disk}
      UPLOAD_DIR: /data/uploads
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-eoffice}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-}
      S3_FORCE_PATH_STYLE: "true"
      # Set true ONCE for a throwaway pilot to seed demo users; then set back to false.
      SEED_ON_START: ${SEED_ON_START:-false}
    volumes:
      - eoffice_db:/data
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      # Bare domain → Caddy auto-provisions TLS. Use ":80" for plain HTTP.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # MinIO is OPT-IN: only started with `docker compose --profile s3 up`.
  # Pinned to a 2023 release built WITHOUT the x86-64-v2 requirement, so it runs on
  # older CPUs. Only relevant when STORAGE_DRIVER=s3; the default disk mode ignores it.
  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    profiles: ["s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Defaults keep the file valid in disk mode; set real values in .env for s3 mode.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eoffice-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-please-set-in-env}
    volumes:
      - minio_data:/data
    ports:
      # Admin console bound to localhost only (reach via SSH tunnel). S3 API stays internal.
      - "127.0.0.1:9001:9001"

  createbuckets:
    image: minio/mc:RELEASE.2023-09-07T22-48-55Z
    profiles: ["s3"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb -p local/$$S3_BUCKET || true;
      mc anonymous set none local/$$S3_BUCKET || true;
      echo 'bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-eoffice}

volumes:
  eoffice_db:
  minio_data:
  caddy_data:
  caddy_config:
